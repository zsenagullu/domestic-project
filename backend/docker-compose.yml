

services:
  db:
    image: postgres:15
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - ALGORITHM=HS256
    depends_on:
      - db

  migrate:
    build: .
    command: alembic upgrade head
    depends_on:
      - backend
      - db
    env_file: .env
    volumes:
      - .:/app

volumes:
  postgres_data:
